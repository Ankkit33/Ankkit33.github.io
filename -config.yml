# Build settings
markdown: kramdown
kramdown:
  input: GFM

remote_theme: "jeffreytse/jekyll-theme-yat"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
