# Welcome to Jekyll!
#
# About Theme
#
# Yet another theme for elegant writers with modern flat style and beautiful
# night/dark mode.
#
# Website: https://github.com/jeffreytse/jekyll-theme-yat
#
# You can do anything you want, including projects for your clients, as long
# as you mention an attribution back (credit links in footer or project).
# See the LICENCE file.
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that.
#
# For technical reasons, this file is *NOT* reloaded automatically when you
# use 'bundle exec jekyll serve'. If you change this file, please restart
# the server process.
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Ankit Kumar's Homepage
email: ankitkumarpadhan333@gmail.com
author: Ankit Kumar

# Copyright setting
copyright: "Copyright (c) 2017-{currentYear} <a href='https://example.com'>Ankit Kumar</a>"

description: >-
 Ankit Kumar's homepage.

baseurl: ""
url: "https://ankkit33.github.io"
favicon: "assets/images/favicons/favicon.ico"

# Yat date format
yat:
  date_format: "%b %d, %Y"

# Debug
# debug: false

# Header
# header_transparent: true

# Width
# content_width: "920px"

# Google analytics
# google_analytics: [Measurement ID]
# enableDNT: "false"

