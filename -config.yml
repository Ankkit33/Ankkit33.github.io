# Welcome to Jekyll!
# Site settings
title: Ankit's Homepage
email: ankitkumarpadhan333@gmail.com
author: Ankkit33

# Copyright setting
copyright: "Copyright (c) 2024-{currentYear} <a href='https://github.com/Ankkit33'>{author}</a>"

description: >-
  Ankit's personal homepage and portfolio.

baseurl: "" 
url: "https://Ankkit33.github.io"
favicon: "assets/images/favicons/favicon.ico"

# Yat date format
yat:
  date_format: "%b %d, %Y"

# Theme Branding
# Default brand colors
orangered: #ff5100
greatgold: #f2cb05
greenblue: #389092
ankkitblue: #348feb

brand_color: ankkitblue

# Header Configuration
header_pages:
  - index.html
  - about.html
  - portfolio.md
  - contact.md

# Page default value
defaults:
  home:
    heading: "Welcome to My Site"
    subheading: "~ Ankit"
    banner: "assets/images/banners/banner_1.jpg"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  
remote_theme: "jeffreytse/jekyll-theme-yat"
theme: jekyll-theme-yat

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-spaceship
